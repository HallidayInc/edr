[package]
name = "edr_deno"
version = "0.1.0"
edition.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
deno_bindgen = "0.8"
mimalloc = { version = "0.1", default-features = false, features = ["local_dynamic_tls"] }

edr_provider = { workspace = true, features = ["test-utils"] }
edr_block_api.workspace = true
edr_chain_config.workspace = true
edr_chain_l1.workspace = true
edr_chain_spec.workspace = true
edr_chain_spec_provider.workspace = true
edr_evm.workspace = true
edr_generic.workspace = true
edr_op = { path = "../edr_op", default-features = false }
edr_primitives.workspace = true
edr_rpc_client.workspace = true
edr_signer.workspace = true
edr_solidity.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread"] }
once_cell = "1.19"
serde_json.workspace = true
# colored log output
ansi_term = { version = "0.12.1", default-features = false }
# Needed for parsing configuration
serde.workspace = true
hex.workspace = true

[target.x86_64-unknown-linux-gnu.dependencies]
openssl-sys = { version = "0.9.93", features = ["vendored"] }

[target.x86_64-unknown-linux-musl.dependencies]
openssl-sys = { version = "0.9.93", features = ["vendored"] }

[target.aarch64-unknown-linux-gnu.dependencies]
openssl-sys = { version = "0.9.93", features = ["vendored"] }

[target.aarch64-unknown-linux-musl.dependencies]
openssl-sys = { version = "0.9.93", features = ["vendored"] }
