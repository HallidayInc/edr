name: build-edr-napi

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            node: linux-arm64-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            node: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - uses: actions-rs/cargo@v1
        with:
          use-cross: true
          command: build
          args: --target ${{ matrix.target }} --release -p edr_napi

      - name: Place prebuild
        run: |
          for f in target/${{ matrix.target }}/release/*edr_napi*.{node,so,dylib,dll}; do
            [ -e "$f" ] && cp "$f" "crates/edr_napi/edr.${{ matrix.node }}.node" && break
          done

      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: crates/edr_napi/edr.${{ matrix.node }}.node
          retention-days: 1

  pack:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: crates/edr_napi
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate JS loader & typings
        run: |
          cd crates/edr_napi
          npx @napi-rs/cli build --release --dts inline
          npm pack --pack-destination ../..

      - uses: actions/upload-artifact@v4
        with:
          name: nomicfoundation-edr
          path: nomicfoundation-edr-*.tgz
